---
- name: Install ct2html and deploy page files
  hosts: web
  become: true
  vars_files:
    - vars.yml
  vars:
    pageroot_dir: "{{ playbook_dir }}/../pageroot"
    ct2html_release_url: "https://github.com/yungcxn/ct2html/releases/latest/download/ct2html-ReleaseSafe.tar.gz"
    ct2html_api_url: "https://api.github.com/repos/yungcxn/ct2html/releases/latest"
    ct2html_version_file: /usr/local/share/ct2html/release_tag

  tasks:

    # ct2html binary

    - name: Query GitHub for the latest ct2html release
      uri:
        url: "{{ ct2html_api_url }}"
        return_content: true
        headers:
          Accept: "application/vnd.github+json"
      register: ct2html_latest_release
      delegate_to: localhost
      become: false
      run_once: true

    - name: Set fact for latest available release tag
      set_fact:
        ct2html_latest_tag: "{{ ct2html_latest_release.json.tag_name }}"

    - name: Check whether a release tag is already recorded on the host
      stat:
        path: "{{ ct2html_version_file }}"
      register: ct2html_version_file_stat

    - name: Read the currently installed release tag, if any
      slurp:
        src: "{{ ct2html_version_file }}"
      register: ct2html_installed_tag_raw
      when: ct2html_version_file_stat.stat.exists

    - name: Set fact for currently installed release tag
      set_fact:
        ct2html_installed_tag: >-
          {{ (ct2html_installed_tag_raw.content | b64decode | trim)
             if ct2html_version_file_stat.stat.exists else '' }}

    - name: Determine whether ct2html needs to be (re)installed
      set_fact:
        ct2html_needs_update: "{{ ct2html_installed_tag != ct2html_latest_tag }}"

    - name: Report ct2html version check
      debug:
        msg: >-
          Installed tag: '{{ ct2html_installed_tag }}',
          latest tag: '{{ ct2html_latest_tag }}'.
          {{ 'Will reinstall.' if ct2html_needs_update else 'Already up to date, skipping download.' }}

    - name: Create temporary directory for ct2html download
      tempfile:
        state: directory
        suffix: ct2html
      register: ct2html_tmp
      when: ct2html_needs_update

    - name: Download latest ct2html release tarball
      get_url:
        url: "{{ ct2html_release_url }}"
        dest: "{{ ct2html_tmp.path }}/ct2html-ReleaseSafe.tar.gz"
        mode: '0644'
      when: ct2html_needs_update

    - name: Extract ct2html tarball
      unarchive:
        src: "{{ ct2html_tmp.path }}/ct2html-ReleaseSafe.tar.gz"
        dest: "{{ ct2html_tmp.path }}"
        remote_src: true
      when: ct2html_needs_update

    - name: Locate the extracted ct2html executable
      find:
        paths: "{{ ct2html_tmp.path }}"
        file_type: file
        excludes: "*.tar.gz"
      register: ct2html_extracted
      when: ct2html_needs_update

    - name: Fail if the archive layout is not what we expect
      assert:
        that:
          - ct2html_extracted.matched == 1
        fail_msg: >-
          Expected exactly one file inside ct2html-ReleaseSafe.tar.gz,
          found {{ ct2html_extracted.matched }}. The release layout may
          have changed — check {{ ct2html_tmp.path }} manually.
        success_msg: "Found single ct2html binary candidate in archive"
      when: ct2html_needs_update

    - name: Install ct2html binary to /bin/ct2html
      copy:
        src: "{{ ct2html_extracted.files[0].path }}"
        dest: /bin/ct2html
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      when: ct2html_needs_update

    - name: Ensure version directory exists
      file:
        path: "{{ ct2html_version_file | dirname }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: ct2html_needs_update

    - name: Record the installed release tag
      copy:
        content: "{{ ct2html_latest_tag }}"
        dest: "{{ ct2html_version_file }}"
        owner: root
        group: root
        mode: '0644'
      when: ct2html_needs_update

    - name: Clean up temporary download directory
      file:
        path: "{{ ct2html_tmp.path }}"
        state: absent
      when: ct2html_needs_update

    # Page files

    - name: Wipe existing files in web root
      file:
        path: "/var/www/{{ domain }}"
        state: absent

    - name: Recreate web root
      file:
        path: "/var/www/{{ domain }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy page files
      copy:
        src: "{{ pageroot_dir }}/"
        dest: "/var/www/{{ domain }}/"
        owner: www-data
        group: www-data
        mode: preserve

    # Verification
    - name: Stat the ct2html binary
      stat:
        path: /bin/ct2html
      register: ct2html_bin_stat

    - name: Assert ct2html binary exists and is executable
      assert:
        that:
          - ct2html_bin_stat.stat.exists
          - ct2html_bin_stat.stat.executable
        fail_msg: "/bin/ct2html is missing or not executable"
        success_msg: "ct2html binary present and executable"

    - name: Sanity-run ct2html binary
      command: /bin/ct2html --help
      register: ct2html_run_check
      changed_when: false
      failed_when: false

    - name: Report ct2html execution check
      debug:
        msg: >-
          ct2html --help exited with rc={{ ct2html_run_check.rc }}.
          rc 127 or an "exec format error" in stderr means the binary
          is broken/wrong-arch; any other rc (even non-zero, e.g. from
          an unrecognised flag) means the binary itself runs fine.
      failed_when: ct2html_run_check.rc == 127 or 'exec format error' in ct2html_run_check.stderr

    - name: Find deployed page files
      find:
        paths: "/var/www/{{ domain }}"
        recurse: true
        file_type: file
      register: deployed_pages

    - name: Assert page files were actually deployed
      assert:
        that:
          - deployed_pages.matched > 0
        fail_msg: >-
          No files found under /var/www/{{ domain }} — check that
          pageroot_dir ({{ pageroot_dir }}) actually contains files
          on the control node.
        success_msg: "{{ deployed_pages.matched }} page file(s) deployed to /var/www/{{ domain }}"
