---
- name: Install ct2html and deploy page files
  hosts: web
  become: true
  vars_files:
    - vars.yml
  vars:
    pageroot_dir: "{{ playbook_dir }}/pageroot"
    ct2html_release_url: "https://github.com/yungcxn/ct2html/releases/latest/download/ct2html-ReleaseSafe.tar.gz"

  tasks:

    # ct2html binary

    - name: Ensure /opt/ct2html directory exists
      file:
        path: /opt/ct2html
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create temporary directory for ct2html download
      tempfile:
        state: directory
        suffix: ct2html
      register: ct2html_tmp

    - name: Download latest ct2html release tarball
      get_url:
        url: "{{ ct2html_release_url }}"
        dest: "{{ ct2html_tmp.path }}/ct2html-ReleaseSafe.tar.gz"
        mode: '0644'

    - name: Extract ct2html tarball
      unarchive:
        src: "{{ ct2html_tmp.path }}/ct2html-ReleaseSafe.tar.gz"
        dest: "{{ ct2html_tmp.path }}"
        remote_src: true

    - name: Locate the extracted ct2html executable
      find:
        paths: "{{ ct2html_tmp.path }}"
        file_type: file
        excludes: "*.tar.gz"
      register: ct2html_extracted

    - name: Fail if the archive layout is not what we expect
      assert:
        that:
          - ct2html_extracted.matched == 1
        fail_msg: >-
          Expected exactly one file inside ct2html-ReleaseSafe.tar.gz,
          found {{ ct2html_extracted.matched }}. The release layout may
          have changed — check {{ ct2html_tmp.path }} manually.
        success_msg: "Found single ct2html binary candidate in archive"

    - name: Install ct2html binary to /opt/ct2html/ct2html
      copy:
        src: "{{ ct2html_extracted.files[0].path }}"
        dest: /opt/ct2html/ct2html
        remote_src: true
        owner: root
        group: root
        mode: '0755'

    - name: Clean up temporary download directory
      file:
        path: "{{ ct2html_tmp.path }}"
        state: absent

    - name: Deploy ct2html CGI wrapper script
      copy:
        dest: /opt/ct2html/ct2html-cgi
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash
          echo "Content-Type: text/html"
          echo ""
          PATH=$(dirname "$(readlink -f "$0")")
          $PATH/../ct2html -i "$CT_FILE" --htmlerror


    # Page files

    - name: Ensure web root exists for this domain
      file:
        path: "/var/www/{{ domain }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Wipe existing files in web root for clean deployment
      file:
        path: "/var/www/{{ domain }}"
        state: absent

    - name: Deploy page files to web root
      copy:
        src: "{{ pageroot_dir }}/"
        dest: "/var/www/{{ domain }}/"
        owner: www-data
        group: www-data
        mode: preserve


    # Verification

    - name: Stat the ct2html binary
      stat:
        path: /opt/ct2html/ct2html
      register: ct2html_bin_stat

    - name: Assert ct2html binary exists and is executable
      assert:
        that:
          - ct2html_bin_stat.stat.exists
          - ct2html_bin_stat.stat.executable
        fail_msg: "/opt/ct2html/ct2html is missing or not executable"
        success_msg: "ct2html binary present and executable"

    - name: Sanity-run ct2html binary
      command: /opt/ct2html/ct2html --help
      register: ct2html_run_check
      changed_when: false
      failed_when: false

    - name: Report ct2html execution check
      debug:
        msg: >-
          ct2html --help exited with rc={{ ct2html_run_check.rc }}.
          rc 127 or an "exec format error" in stderr means the binary
          is broken/wrong-arch; any other rc (even non-zero, e.g. from
          an unrecognised flag) means the binary itself runs fine.
      failed_when: ct2html_run_check.rc == 127 or 'exec format error' in ct2html_run_check.stderr

    - name: Stat the ct2html-cgi wrapper
      stat:
        path: /opt/ct2html/ct2html-cgi
      register: ct2html_cgi_stat

    - name: Assert ct2html-cgi exists and is executable
      assert:
        that:
          - ct2html_cgi_stat.stat.exists
          - ct2html_cgi_stat.stat.executable
        fail_msg: "/opt/ct2html/ct2html-cgi is missing or not executable"
        success_msg: "ct2html-cgi wrapper present and executable"

    - name: Check ct2html-cgi bash syntax
      command: bash -n /opt/ct2html/ct2html-cgi
      changed_when: false

    - name: Find deployed page files
      find:
        paths: "/var/www/{{ domain }}"
        recurse: true
        file_type: file
      register: deployed_pages

    - name: Assert page files were actually deployed
      assert:
        that:
          - deployed_pages.matched > 0
        fail_msg: >-
          No files found under /var/www/{{ domain }} — check that
          pageroot_dir ({{ pageroot_dir }}) actually contains files
          on the control node.
        success_msg: "{{ deployed_pages.matched }} page file(s) deployed to /var/www/{{ domain }}"
