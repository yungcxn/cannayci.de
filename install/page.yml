---
- name: Install ct2html and run it as the web server via systemd
  hosts: web
  become: true
  vars_files:
    - vars.yml
  vars:
    pageroot_dir: "{{ playbook_dir }}/../pageroot"
    ct2html_repo_url: "https://github.com/yungcxn/ct2html.git"
    ct2html_src_dir: /home/ansible/Documents/ct2html
    ct2html_version_file: /usr/local/share/ct2html/build_commit
    ct2html_webroot: "/var/www/{{ domain }}"
    ct2html_service_name: ct2html
    ct2html_run_user: root
    ct2html_run_group: root
    ct2html_extra_args: ""

  handlers:

    - name: Reload systemd
      systemd:
        daemon_reload: true
      listen: "reload systemd"

    - name: Restart ct2html service
      systemd:
        name: "{{ ct2html_service_name }}"
        state: restarted
      listen: "restart ct2html"

  tasks:

    - name: Ensure git is installed
      package:
        name: git
        state: present

    - name: Check for the zig toolchain
      command: zig version
      register: ct2html_zig_version
      changed_when: false
      failed_when: false

    - name: Fail if zig is not installed
      assert:
        that:
          - ct2html_zig_version.rc == 0
        fail_msg: >-
          zig was not found on {{ inventory_hostname }}. Install it first before running this playbook.
        success_msg: "zig toolchain found: {{ ct2html_zig_version.stdout }}"

    - name: Query latest commit on the ct2html default branch
      command: git ls-remote {{ ct2html_repo_url }} HEAD
      register: ct2html_ls_remote
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false

    - name: Set fact for latest available commit
      set_fact:
        ct2html_latest_commit: "{{ ct2html_ls_remote.stdout.split()[0] }}"

    - name: Check whether a build is already recorded on the host
      stat:
        path: "{{ ct2html_version_file }}"
      register: ct2html_version_file_stat

    - name: Read the currently installed commit, if any
      slurp:
        src: "{{ ct2html_version_file }}"
      register: ct2html_installed_commit_raw
      when: ct2html_version_file_stat.stat.exists

    - name: Set fact for currently installed commit
      set_fact:
        ct2html_installed_commit: >-
          {{ (ct2html_installed_commit_raw.content | b64decode | trim)
             if ct2html_version_file_stat.stat.exists else '' }}

    - name: Determine whether ct2html needs to be (re)built
      set_fact:
        ct2html_needs_update: "{{ ct2html_installed_commit != ct2html_latest_commit }}"

    - name: Report ct2html version check
      debug:
        msg: >-
          Installed commit: '{{ ct2html_installed_commit }}',
          latest commit: '{{ ct2html_latest_commit }}'.
          {{ 'Will rebuild.' if ct2html_needs_update else 'Already up to date, skipping build.' }}

    - name: Ensure source parent directory exists
      file:
        path: "{{ ct2html_src_dir | dirname }}"
        state: directory
        mode: '0755'
      when: ct2html_needs_update

    - name: Clone or update the ct2html repository
      git:
        repo: "{{ ct2html_repo_url }}"
        dest: "{{ ct2html_src_dir }}"
        version: "{{ ct2html_latest_commit }}"
        force: true
      when: ct2html_needs_update

    - name: Build ct2html
      command: zig build -Doptimize=ReleaseFast
      args:
        chdir: "{{ ct2html_src_dir }}"
      when: ct2html_needs_update

    - name: Stat the freshly built binary
      stat:
        path: "{{ ct2html_src_dir }}/ct2html"
      register: ct2html_built_bin
      when: ct2html_needs_update

    - name: Fail if the build did not produce the expected binary
      assert:
        that:
          - ct2html_built_bin.stat.exists
        fail_msg: >-
          zig build did not produce {{ ct2html_src_dir }}/ct2html — check
          the build output above and confirm the executable name/location
          in build.zig hasn't changed.
        success_msg: "Found built ct2html binary at {{ ct2html_src_dir }}/ct2html"
      when: ct2html_needs_update

    - name: Test that the freshly built binary runs
      command: ./ct2html --help
      args:
        chdir: "{{ ct2html_src_dir }}"
      register: ct2html_help_check
      changed_when: false
      when: ct2html_needs_update

    - name: Install ct2html binary to /bin/ct2html
      copy:
        src: "{{ ct2html_src_dir }}/ct2html"
        dest: /bin/ct2html
        remote_src: true
        owner: root
        group: root
        mode: '0755'
      when: ct2html_needs_update
      notify: "restart ct2html"

    - name: Ensure version directory exists
      file:
        path: "{{ ct2html_version_file | dirname }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: ct2html_needs_update

    - name: Record the installed commit
      copy:
        content: "{{ ct2html_latest_commit }}"
        dest: "{{ ct2html_version_file }}"
        owner: root
        group: root
        mode: '0644'
      when: ct2html_needs_update

    - name: Wipe existing files in web root
      file:
        path: "{{ ct2html_webroot }}"
        state: absent

    - name: Recreate web root
      file:
        path: "{{ ct2html_webroot }}"
        state: directory
        owner: "{{ ct2html_run_user }}"
        group: "{{ ct2html_run_group }}"
        mode: '0755'

    - name: Deploy page files
      copy:
        src: "{{ pageroot_dir }}/"
        dest: "{{ ct2html_webroot }}/"
        owner: "{{ ct2html_run_user }}"
        group: "{{ ct2html_run_group }}"
        mode: preserve
      notify: "restart ct2html"

    - name: Deploy ct2html systemd unit
      copy:
        dest: "/etc/systemd/system/{{ ct2html_service_name }}.service"
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=ct2html web server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/bin/ct2html -w -c {{ ct2html_webroot }} {{ ct2html_extra_args }}
          WorkingDirectory={{ ct2html_webroot }}
          User={{ ct2html_run_user }}
          Group={{ ct2html_run_group }}
          Restart=always
          RestartSec=2
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier={{ ct2html_service_name }}

          [Install]
          WantedBy=multi-user.target
      notify:
        - "reload systemd"
        - "restart ct2html"

    - name: Ensure ct2html service is enabled and started
      systemd:
        name: "{{ ct2html_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Stat the ct2html binary
      stat:
        path: /bin/ct2html
      register: ct2html_bin_stat

    - name: Assert ct2html binary exists and is executable
      assert:
        that:
          - ct2html_bin_stat.stat.exists
          - ct2html_bin_stat.stat.executable
        fail_msg: "/bin/ct2html is missing or not executable"
        success_msg: "ct2html binary present and executable"

    - name: Check ct2html service status
      systemd:
        name: "{{ ct2html_service_name }}"
      register: ct2html_service_status

    - name: Report ct2html service check
      debug:
        msg: >-
          ct2html.service ActiveState={{ ct2html_service_status.status.ActiveState }},
          SubState={{ ct2html_service_status.status.SubState }}.
          Logs: journalctl -u {{ ct2html_service_name }}

    - name: Assert ct2html service is active and running
      assert:
        that:
          - ct2html_service_status.status.ActiveState == 'active'
          - ct2html_service_status.status.SubState == 'running'
        fail_msg: >-
          ct2html.service is not active/running — check
          `journalctl -u {{ ct2html_service_name }} -n 100` on the host.
        success_msg: "ct2html.service is active and running"

    - name: Find deployed page files
      find:
        paths: "{{ ct2html_webroot }}"
        recurse: true
        file_type: file
      register: deployed_pages

    - name: Assert page files were actually deployed
      assert:
        that:
          - deployed_pages.matched > 0
        fail_msg: >-
          No files found under {{ ct2html_webroot }} — check that
          pageroot_dir ({{ pageroot_dir }}) actually contains files
          on the control node.
        success_msg: "{{ deployed_pages.matched }} page file(s) deployed to {{ ct2html_webroot }}"